# Default workflow configuration. API credentials are read from environment variables.
mock_mode: false
llm:
  required: true
  provider: openai_compatible
  model: deepseek-chat
  api_key_env: LLM_API_KEY
  base_url_env: LLM_BASE_URL
  timeout_sec: 30
  temperature: 0.3
  max_tokens: 1200
asr:
  enabled: true
  backend: faster-whisper
  model_size: small
  device: cpu
  compute_type: int8
  language: auto
  task: transcribe
workflow:
  default_policy_path: configs/workflow_policy.yaml
  export_video_by_default: false
  judge_threshold: 0.75
  max_repair_rounds: 3
media:
  final_video_backend: ffmpeg
  width: 640
  height: 360
  fps: 24
  video_codec: h264
  audio_codec: aac
