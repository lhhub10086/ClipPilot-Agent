# Full-ASR configuration for long runs. It is slower and should be used explicitly.
mock_mode: false
llm:
  required: true
  provider: openai_compatible
  model: deepseek-chat
  api_key_env: LLM_API_KEY
  base_url_env: LLM_BASE_URL
  timeout_sec: 30
  temperature: 0.3
  max_tokens: 1200
asr:
  enabled: true
  backend: faster-whisper
  config_name: full_asr
  model_size: small
  device: cpu
  compute_type: int8
  language: auto
  task: transcribe
  max_full_duration_sec: 4000
workflow:
  default_policy_path: configs/workflow_policy.yaml
  export_video_by_default: false
  judge_threshold: 0.75
  max_repair_rounds: 3
